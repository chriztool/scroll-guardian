workflows:
  ios-unsigned:
    name: iOS Unsigned Build
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build unsigned iOS app
        script: flutter build ios --no-codesign --release
      - name: Package into IPA
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r scroll-guardian-unsigned.ipa Payload
    artifacts:
      - scroll-guardian-unsigned.ipa
